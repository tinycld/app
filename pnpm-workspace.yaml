# pnpm 11+ project configuration. Most settings that were historically in
# .npmrc (kebab-case) moved here as camelCase keys.

# Flat node_modules. Metro's resolver (metro.config.cjs) and vitest's alias
# map (vitest.config.ts) both assume every dep lands at <root>/node_modules/<name>.
# Without this pnpm builds a nested symlink tree under .pnpm/ that Metro
# cannot follow, and `react` / `react-native-web` / `yjs` end up resolved to
# multiple copies.
nodeLinker: hoisted

# Expo's RN packages declare loose peer deps; without shamefullyHoist some
# transitive react-native deps end up unreachable from `react-native`'s own
# code, which expects to find them at the top level.
shamefullyHoist: true

# Sibling packages under packages/<name> are symlinks to repos outside this
# tree (e.g. ../../mail). We never want pnpm to try to install them as
# workspace members — our package set is determined at runtime by the
# symlink set, not by lockfile state. No `packages:` field below means
# pnpm sees no workspace members.

# Dependencies whose lifecycle scripts (postinstall, etc.) are allowed to run
# during install. pnpm 11 quarantines build scripts by default. Both of these
# get used at runtime (Sentry CLI for sourcemap upload, esbuild for the
# vitest bundler), so allow them.
allowBuilds:
  '@sentry/cli': true
  esbuild: true
