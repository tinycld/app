name: Smoke-test docker image

# Runs after the docker-publish workflow uploads a fresh image to GHCR.
# Pulls the just-published image, boots it via `docker run`, walks the
# /setup wizard with Playwright, and asserts that every bundled package
# shows up on the Packages tab. Same path a docs-following operator
# takes — guards the install instructions against regressions.

# Chains off the docker-publish workflow (now in THIS repo — app is the release
# anchor), which uploads a fresh image to GHCR. workflow_run fires only for
# same-repo workflows, so this now triggers automatically after a publish; the
# "Pick image ref" step below derives the tag from the upstream run. Still
# manually dispatchable for ad-hoc testing of any image_ref.
on:
  workflow_run:
    workflows: ['Build and publish Docker image']
    types: [completed]
  workflow_dispatch:
    inputs:
      image_ref:
        description: 'Image tag or digest to test (e.g. latest, 0.0.1, sha256:...)'
        required: false
        default: 'latest'

jobs:
  smoke:
    name: Run install smoke test
    runs-on: ubuntu-latest
    # Hard cap: the spec itself is ~30s on a working container. Anything
    # past 10 minutes is wedged — fail loudly instead of burning runner
    # minutes silently. Previous runs hung for 50+ min producing no output.
    timeout-minutes: 10
    # workflow_run fires on completion regardless of outcome; only smoke-test a
    # successful publish. Manual dispatch always runs.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Pick image ref
        id: imgref
        run: |
          set -eu
          if [ -n "${{ inputs.image_ref || '' }}" ]; then
            ref="${{ inputs.image_ref }}"
          elif [ "${{ github.event.workflow_run.event }}" = "push" ] && [[ "${{ github.event.workflow_run.head_branch }}" =~ ^v[0-9] ]]; then
            # Tag push: head_branch is the tag name (e.g. v0.0.1). Strip
            # the leading 'v' to match docker semver tags.
            tag="${{ github.event.workflow_run.head_branch }}"
            ref="${tag#v}"
          else
            # Release event (or any default): :latest is the docs-pull target.
            ref="latest"
          fi
          owner_lower=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          image="ghcr.io/${owner_lower}/tinycld:${ref}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "ref=${ref}"     >> "$GITHUB_OUTPUT"
          echo "Testing ${image}"

      - name: Log in to GHCR (read-only)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull ${{ steps.imgref.outputs.image }}

      - name: Boot container
        run: |
          set -eu
          docker rm -f tinycld-smoke 2>/dev/null || true
          # Plain-HTTP mode (AUTOCERT_ENABLED unset): the container binds
          # :7090. The Playwright config below talks to localhost:7090.
          docker run -d --name tinycld-smoke -p 7090:7090 ${{ steps.imgref.outputs.image }}

      - name: Wait for /api/health
        run: |
          set -eu
          # PocketBase reports healthy when the HTTP listener is up. Generous
          # ceiling: schema generation + release promotion can take a few
          # seconds on first boot.
          for i in $(seq 1 60); do
            if curl -sf http://localhost:7090/api/health >/dev/null; then
              echo "[ready] after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::container never became healthy"
          docker logs tinycld-smoke || true
          exit 1

      - name: Scrape setup token from container logs
        id: token
        run: |
          set -eu
          token=$(docker logs tinycld-smoke 2>&1 | grep -oE 'token=[a-f0-9]+' | head -1 | cut -d= -f2)
          if [ -z "$token" ]; then
            echo "::error::no setup token printed in logs"
            docker logs tinycld-smoke
            exit 1
          fi
          echo "token=${token}" >> "$GITHUB_OUTPUT"
          # Mask in subsequent log output even though it's a one-time bootstrap.
          echo "::add-mask::${token}"

      # The post-cutover app repo has no package-lock.json (the lockfile
      # lives only at the workspace root, which isn't checked in) and the
      # full devDependencies include unpublished @tinycld/* siblings that
      # would 404 against npm. The smoke spec only imports @playwright/test,
      # so install it standalone in a sibling temp dir and run the spec
      # by absolute path. PW_VER tracks app's own @playwright/test pin so
      # smoke runs against the same major as the rest of the suite.
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .node-version

      - name: Install Playwright (standalone)
        id: pw
        run: |
          set -eu
          PW_VER=$(node -e "console.log(require('./package.json').devDependencies['@playwright/test'].replace(/^[\^~>=<]+/, ''))")
          echo "Installing @playwright/test@${PW_VER}"
          PW_ROOT=$(mktemp -d)
          cd "${PW_ROOT}"
          npm init -y >/dev/null
          # Record the install in package.json (drop --no-save) and produce
          # a local lockfile (drop --no-package-lock) so the resolution is
          # explicit. Then check the binary actually landed before we move
          # on — a silent install + missing binary would hang the next step.
          npm install --ignore-scripts "@playwright/test@${PW_VER}"
          ls -la node_modules/.bin/playwright
          echo "root=${PW_ROOT}" >> "$GITHUB_OUTPUT"

      - name: Install Playwright Chromium
        working-directory: ${{ steps.pw.outputs.root }}
        # Invoke the binary by absolute path — never rely on npx's resolver
        # for the playwright lookup; it has surprised us before.
        run: ./node_modules/.bin/playwright install --with-deps chromium

      # Diagnostic: confirm playwright can load the config + discover the
      # spec at all. Test execution can hang on a browser context; --list
      # only loads the config and enumerates specs, so a hang here vs a
      # hang in the next step tells us which side is broken.
      - name: List discovered specs (diagnostic)
        working-directory: ${{ steps.pw.outputs.root }}
        timeout-minutes: 1
        run: ./node_modules/.bin/playwright test --config ${{ github.workspace }}/tests/install/playwright.config.ts --list

      - name: Run install smoke spec
        working-directory: ${{ steps.pw.outputs.root }}
        timeout-minutes: 5
        env:
          PW_BASE_URL: http://localhost:7090
          PW_SETUP_TOKEN: ${{ steps.token.outputs.token }}
          CI: 'true'
          # Surface activity if anything hangs.
          DEBUG: 'pw:api,pw:browser*,pw:protocol'
          # Force unbuffered stdio so DEBUG output reaches the runner log
          # in real time instead of pooling for a flush that never comes.
          FORCE_COLOR: '0'
        run: ./node_modules/.bin/playwright test --config ${{ github.workspace }}/tests/install/playwright.config.ts --reporter=line 2>&1

      - name: Capture container logs on failure
        if: failure()
        run: |
          mkdir -p smoke-logs
          docker logs tinycld-smoke > smoke-logs/container.log 2>&1 || true

      - name: Upload Playwright report + container logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-artifacts-${{ steps.imgref.outputs.ref }}
          path: |
            playwright-report/
            test-results/
            smoke-logs/
          if-no-files-found: warn
          retention-days: 7

      - name: Tear down container
        if: always()
        run: docker rm -f tinycld-smoke || true

      - name: Summary
        if: success()
        run: |
          echo "### Smoke test passed" >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ steps.imgref.outputs.image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: ${{ github.event_name }} (${{ github.event.workflow_run.event || 'manual' }})" >> "$GITHUB_STEP_SUMMARY"
