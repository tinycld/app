name: Smoke-test docker image

# Runs after the docker-publish workflow uploads a fresh image to GHCR.
# Pulls the just-published image, boots it via `docker run`, walks the
# /setup wizard with Playwright, and asserts that every bundled package
# shows up on the Packages tab. Same path a docs-following operator
# takes — guards the install instructions against regressions.

# Chains off the docker-publish workflow (now in THIS repo — app is the release
# anchor), which uploads a fresh image to GHCR. workflow_run fires only for
# same-repo workflows, so this now triggers automatically after a publish; the
# "Pick image ref" step below derives the tag from the upstream run. Still
# manually dispatchable for ad-hoc testing of any image_ref.
on:
  workflow_run:
    workflows: ['Build and publish Docker image']
    types: [completed]
  workflow_dispatch:
    inputs:
      image_ref:
        description: 'Image tag or digest to test (e.g. latest, 0.0.1, sha256:...)'
        required: false
        default: 'latest'

jobs:
  smoke:
    name: Run install smoke test
    runs-on: ubuntu-latest
    # workflow_run fires on completion regardless of outcome; only smoke-test a
    # successful publish. Manual dispatch always runs.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Pick image ref
        id: imgref
        run: |
          set -eu
          if [ -n "${{ inputs.image_ref || '' }}" ]; then
            ref="${{ inputs.image_ref }}"
          elif [ "${{ github.event.workflow_run.event }}" = "push" ] && [[ "${{ github.event.workflow_run.head_branch }}" =~ ^v[0-9] ]]; then
            # Tag push: head_branch is the tag name (e.g. v0.0.1). Strip
            # the leading 'v' to match docker semver tags.
            tag="${{ github.event.workflow_run.head_branch }}"
            ref="${tag#v}"
          else
            # Release event (or any default): :latest is the docs-pull target.
            ref="latest"
          fi
          owner_lower=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          image="ghcr.io/${owner_lower}/tinycld:${ref}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "ref=${ref}"     >> "$GITHUB_OUTPUT"
          echo "Testing ${image}"

      - name: Log in to GHCR (read-only)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull ${{ steps.imgref.outputs.image }}

      - name: Boot container
        run: |
          set -eu
          docker rm -f tinycld-smoke 2>/dev/null || true
          # Plain-HTTP mode (no SERVE_ON_DOMAINS): the container binds
          # :7090. The Playwright config below talks to localhost:7090.
          docker run -d --name tinycld-smoke -p 7090:7090 ${{ steps.imgref.outputs.image }}

      - name: Wait for /api/health
        run: |
          set -eu
          # PocketBase reports healthy when the HTTP listener is up. Generous
          # ceiling: schema generation + release promotion can take a few
          # seconds on first boot.
          for i in $(seq 1 60); do
            if curl -sf http://localhost:7090/api/health >/dev/null; then
              echo "[ready] after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::container never became healthy"
          docker logs tinycld-smoke || true
          exit 1

      - name: Scrape setup token from container logs
        id: token
        run: |
          set -eu
          token=$(docker logs tinycld-smoke 2>&1 | grep -oE 'token=[a-f0-9]+' | head -1 | cut -d= -f2)
          if [ -z "$token" ]; then
            echo "::error::no setup token printed in logs"
            docker logs tinycld-smoke
            exit 1
          fi
          echo "token=${token}" >> "$GITHUB_OUTPUT"
          # Mask in subsequent log output even though it's a one-time bootstrap.
          echo "::add-mask::${token}"

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run install smoke spec
        env:
          PW_BASE_URL: http://localhost:7090
          PW_SETUP_TOKEN: ${{ steps.token.outputs.token }}
          CI: 'true'
        run: npx playwright test --config tests/install/playwright.config.ts

      - name: Capture container logs on failure
        if: failure()
        run: |
          mkdir -p smoke-logs
          docker logs tinycld-smoke > smoke-logs/container.log 2>&1 || true

      - name: Upload Playwright report + container logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-artifacts-${{ steps.imgref.outputs.ref }}
          path: |
            playwright-report/
            test-results/
            smoke-logs/
          if-no-files-found: warn
          retention-days: 7

      - name: Tear down container
        if: always()
        run: docker rm -f tinycld-smoke || true

      - name: Summary
        if: success()
        run: |
          echo "### Smoke test passed" >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ steps.imgref.outputs.image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: ${{ github.event_name }} (${{ github.event.workflow_run.event || 'manual' }})" >> "$GITHUB_STEP_SUMMARY"
