name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TEST_USER_LOGIN: user@tinycld.org
  TEST_USER_PW: TestUser1234!
  ADMIN_USER_LOGIN: admin@tinycld.org
  ADMIN_USER_PW: AdminPass1234!

jobs:
  checks:
    name: Lint, Typecheck, Unit (app)
    runs-on: ubuntu-latest
    steps:
      # This repo (the merged app shell + core) is the triggering checkout. It IS
      # the `tinycld` workspace member, so check it out into the ws/tinycld slot —
      # bootstrap then sees it present and skips re-cloning it (testing THIS PR's
      # code, not a fresh clone of main). bootstrap generates the workspace root
      # into ws/ around it; no `--with <feature>` flags, so the assembly is
      # app+core only. App PRs check app's own code; cross-package integration
      # drift surfaces on the downstream feature PR's CI.
      - uses: actions/checkout@v5
        with:
          path: ws/tinycld
      # tinycld carries its own .node-version; read it from the checkout (no
      # dependency on bootstrap having generated ws/.node-version yet). No
      # package-manager cache: no committed lockfile (pnpm resolves fresh;
      # corepack enable selects the pnpm pinned in the workspace package.json).
      - uses: actions/setup-node@v5
        with:
          node-version-file: ws/tinycld/.node-version
      - name: Assemble workspace (app + core)
        working-directory: ws
        run: TINYCLD_REPO_BASE=https://github.com/tinycld npx @tinycld/bootstrap@latest --assemble-only
      # Go toolchain after assembly: .go-version is bootstrap-generated into ws/.
      - uses: actions/setup-go@v6
        with:
          go-version-file: ws/.go-version
      - name: Install (workspace root)
        working-directory: ws
        run: corepack enable && pnpm install --no-frozen-lockfile
      - name: Check (lint + typecheck + unit)
        working-directory: ws/tinycld
        run: pnpm exec tinycld-pkg check

  go:
    name: Go build & test
    runs-on: ubuntu-latest
    steps:
      # Same minimal assembly as the checks job — app+core only. The generator
      # always emits server/go.work listing core (so even a zero-feature build
      # resolves core's transitive deps in workspace mode). Feature PRs verify
      # their own Go modules on their own CI; integration is tested at release
      # time.
      - uses: actions/checkout@v5
        with:
          path: ws/tinycld
      - uses: actions/setup-node@v5
        with:
          node-version-file: ws/tinycld/.node-version
      - name: Assemble workspace (app + core)
        working-directory: ws
        run: TINYCLD_REPO_BASE=https://github.com/tinycld npx @tinycld/bootstrap@latest --assemble-only
      - uses: actions/setup-go@v6
        with:
          go-version-file: ws/.go-version
      - name: Install (workspace root)
        working-directory: ws
        run: corepack enable && pnpm install --no-frozen-lockfile
      # Warm go.work.sum: in workspace mode `go mod download` writes the
      # transitive `/go.mod` hashes (reached through go.work's `use ../core/server`)
      # into go.work.sum so the build below verifies cleanly.
      - name: Go mod download
        working-directory: ws/tinycld/server
        run: go mod download
      - name: Go build
        working-directory: ws/tinycld/server
        run: go build -o tinycld .
      - name: Go test
        working-directory: ws/tinycld/server
        run: go test -tags no_ui ./...

  e2e:
    name: E2E (app shell)
    runs-on: ubuntu-latest
    steps:
      # app+core assembled by bootstrap as usual, then we scaffold a tiny
      # shortcut-stub package locally so the keyboard-shortcut tests have
      # a real package contributing nav.shortcut + a routable URL. The
      # stub keeps app's e2e fully self-contained (no dependency on any
      # real feature package) — the same pattern drive/ uses for its
      # share-stub scaffolder. See tests/scripts/scaffold-shortcut-stub.ts
      # for what the stub provides.
      - uses: actions/checkout@v5
        with:
          path: ws/tinycld
      - uses: actions/setup-node@v5
        with:
          node-version-file: ws/tinycld/.node-version
      - name: Assemble workspace (app + core)
        working-directory: ws
        run: TINYCLD_REPO_BASE=https://github.com/tinycld npx @tinycld/bootstrap@latest --assemble-only
      - uses: actions/setup-go@v6
        with:
          go-version-file: ws/.go-version
      - name: Install (workspace root)
        working-directory: ws
        run: corepack enable && pnpm install --no-frozen-lockfile
      # Warm go.work.sum before E2E so the webServer (which builds PB via
      # pnpm run expo:test → reset-dev-db) doesn't fail verifying a transitive
      # dep reached through go.work's `use ../core/server`.
      - name: Go mod download
        working-directory: ws/tinycld/server
        run: go mod download
      # Composite action: installs watchman so Metro doesn't fall back to
      # the fs.watch polling that has correlated with a blank-page-after-
      # reload flake under Playwright multi-worker load. Lives in this
      # repo and is also consumed by sibling repos via
      # `tinycld/tinycld/.github/actions/configure-test-env@main`.
      - name: Configure test env
        uses: ./ws/tinycld/.github/actions/configure-test-env
      - name: Scaffold shortcut-stub package
        working-directory: ws
        run: pnpm exec tsx tinycld/tests/scripts/scaffold-shortcut-stub.ts
      - name: Install Playwright browsers
        working-directory: ws/tinycld
        run: pnpm exec playwright install --with-deps chromium
      - name: E2E
        working-directory: ws/tinycld
        run: pnpm exec tinycld-pkg test:e2e
      # Capture Playwright's per-failure artifacts (trace, screenshot,
      # video, error-context.md) so a CI failure can be diagnosed
      # without a re-run. `if: failure()` skips the upload on green
      # runs to save bandwidth + retention.
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            ws/tinycld/test-results/
            ws/tinycld/playwright-report/
          retention-days: 14
