name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TEST_USER_LOGIN: user@tinycld.org
  TEST_USER_PW: TestUser1234!
  ADMIN_USER_LOGIN: admin@tinycld.org
  ADMIN_USER_PW: AdminPass1234!

jobs:
  checks:
    name: Lint, Typecheck, Unit (all members)
    runs-on: ubuntu-latest
    steps:
      # app (this repo) is the triggering checkout. bootstrap GENERATES the
      # workspace root into ws/ and clones the other members around ws/app.
      - uses: actions/checkout@v5
        with:
          path: ws/app
      # app carries its own .node-version; read it from the checkout (no
      # dependency on bootstrap having generated ws/.node-version yet). No npm
      # cache: there is no committed lockfile (npm install resolves fresh).
      - uses: actions/setup-node@v5
        with:
          node-version-file: ws/app/.node-version
      # app's CI runs --all, so it needs EVERY member present. bootstrap
      # generates the root + clones core + each feature; app is already present.
      - name: Assemble workspace (generate root + all members)
        working-directory: ws
        run: >
          TINYCLD_REPO_BASE=https://github.com/tinycld npx @tinycld/bootstrap@latest --tooling
          --with contacts --with mail --with calendar --with drive
          --with calc --with text --with google-takeout-import
      # Go toolchain after assembly: .go-version is bootstrap-generated into ws/.
      - uses: actions/setup-go@v6
        with:
          go-version-file: ws/.go-version
      - name: Install (workspace root)
        working-directory: ws
        run: npm install
      - name: Lint
        working-directory: ws/app
        run: npm run lint
      - name: Typecheck + unit (all members)
        working-directory: ws/app
        run: npx tinycld-pkg check --all

  go:
    name: Go build & test
    runs-on: ubuntu-latest
    steps:
      # app (this repo) is the triggering checkout; bootstrap generates the root
      # and clones the rest around ws/app.
      - uses: actions/checkout@v5
        with:
          path: ws/app
      - uses: actions/setup-node@v5
        with:
          node-version-file: ws/app/.node-version
      # All feature server packages must be present so go.work + the Go build
      # see every tinycld.org/packages/* module.
      - name: Assemble workspace (generate root + all members)
        working-directory: ws
        run: >
          TINYCLD_REPO_BASE=https://github.com/tinycld npx @tinycld/bootstrap@latest --tooling
          --with contacts --with mail --with calendar --with drive
          --with calc --with text --with google-takeout-import
      # Go toolchain after assembly: .go-version is bootstrap-generated into ws/.
      - uses: actions/setup-go@v6
        with:
          go-version-file: ws/.go-version
      - name: Install (workspace root)
        working-directory: ws
        run: npm install
      - name: Go build
        working-directory: ws/app/server
        run: go build -o tinycld .
      - name: Go test
        working-directory: ws/app/server
        run: go test -tags no_ui ./...
