name: Build and publish Docker image

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute lowercase image name. GHCR rejects uppercase paths, so we can't
      # just reuse github.repository if the org or repo name has any uppercase.
      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/tinycld" >> "$GITHUB_OUTPUT"

      - name: Derive tags
        id: tags
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          # Disable the auto-flavor that emits :latest for the highest semver.
          # We control :latest explicitly via the type=raw rule below so a raw
          # tag push doesn't accidentally move it.
          flavor: |
            latest=false
          # Tag strategy:
          #   - any v1.2.3 trigger (tag push or release)  → :1.2.3 + :1.2 + :1
          #   - non-prerelease GitHub Release             → also :latest
          # A raw tag push never moves :latest — only a published, non-prerelease
          # GitHub Release does, so we can tag-test without disturbing prod pulls.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && github.event.release.prerelease == false }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Bake the default feature packages into every public image so a
          # docs-following operator gets mail/calendar/contacts/drive out of
          # the box. google-takeout-import is currently a private repo, so
          # it stays out of the public image until the repo is made public
          # — at which point append it to LINKED_PACKAGES below.
          # TODO: pin each entry to a tagged ref (e.g.
          #   https://github.com/tinycld/mail.git@v0.1.0
          # ) once the sibling repos start cutting versioned tags.
          build-args: |
            LINKED_PACKAGES=https://github.com/tinycld/mail.git https://github.com/tinycld/calendar.git https://github.com/tinycld/contacts.git https://github.com/tinycld/drive.git

      - name: Summary
        run: |
          echo "### Published images" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.tags.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
