name: Build and publish Docker image

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Cancel any in-flight build for the same ref. The release event for a tag
# fires alongside the tag-push event, and without this the same image would
# build twice in parallel, fighting for the same buildx cache and runner
# pool. We let the release event win (it's the one that moves :latest).
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Per-platform build ────────────────────────────────────────────────
  # Each architecture builds on a *native* runner (amd64 on ubuntu-latest,
  # arm64 on ubuntu-24.04-arm). No QEMU emulation. Each job pushes a digest
  # to GHCR but does NOT tag it; the merge job below assembles the
  # multi-arch manifest and applies the human-readable tags.
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            cache_scope: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            cache_scope: arm64

    steps:
      - name: Checkout workspace meta-repo
        uses: actions/checkout@v5
        with:
          repository: tinycld/workspace
          ref: main
          path: ws
      - name: Checkout app into the member slot
        uses: actions/checkout@v5
        with:
          path: ws/app

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/tinycld" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: ws/.node-version
      - name: Assemble workspace members (all features, for the bundled image)
        working-directory: ws
        run: >
          TINYCLD_REPO_BASE=https://github.com/tinycld npx @tinycld/bootstrap@latest --tooling
          --with contacts --with mail --with calendar --with drive
          --with calc --with text --with google-takeout-import

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ws
          file: ws/app/Dockerfile
          platforms: ${{ matrix.platform }}
          # Cache scoped per-platform so the two jobs don't trample each
          # other's layers. Cache hit speeds repeat builds dramatically.
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
          # Push by digest only — no tag yet. The merge job picks up these
          # digests and stitches them into a single multi-arch manifest.
          outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest='${{ steps.build.outputs.digest }}'
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.cache_scope }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Merge per-platform digests into a multi-arch manifest ────────────
  # This job runs after both build jobs succeed. It downloads the digests,
  # uses `docker buildx imagetools create` to assemble the manifest list
  # under each desired tag (versioned + optional :latest).
  merge:
    name: Merge multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/tinycld" >> "$GITHUB_OUTPUT"

      - name: Derive tags
        id: tags
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          # Disable the auto-flavor that emits :latest for the highest semver.
          # We control :latest explicitly via the type=raw rule below so a raw
          # tag push doesn't accidentally move it.
          flavor: |
            latest=false
          # Tag strategy:
          #   - any v1.2.3 trigger (tag push or release)  → :1.2.3 + :1.2 + :1
          #   - non-prerelease GitHub Release             → also :latest
          # A raw tag push never moves :latest — only a published,
          # non-prerelease GitHub Release does, so we can tag-test without
          # disturbing prod pulls.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && github.event.release.prerelease == false }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          set -eu
          # Build the `--tag` arg list from the metadata-action output. Each
          # line in steps.tags.outputs.tags is a fully-qualified tag like
          # ghcr.io/tinycld/tinycld:0.0.2.
          tag_args=""
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            tag_args="$tag_args --tag $tag"
          done <<< '${{ steps.tags.outputs.tags }}'

          # Each downloaded digest filename is the bare digest (without the
          # 'sha256:' prefix). Compose the source-image-by-digest list.
          src_args=""
          for f in *; do
            [ -e "$f" ] || continue
            src_args="$src_args ${{ steps.image.outputs.name }}@sha256:${f}"
          done

          docker buildx imagetools create $tag_args $src_args

      - name: Inspect published manifest
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "::group::$tag"
            docker buildx imagetools inspect "$tag"
            echo "::endgroup::"
          done <<< '${{ steps.tags.outputs.tags }}'

      - name: Summary
        run: |
          echo "### Published images" >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo 'Multi-arch manifest: `linux/amd64` + `linux/arm64`' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.tags.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
