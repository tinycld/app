name: Build and publish Docker image

# Lives in the tinycld/app repo — the release ANCHOR. A published Release
# on THIS repo triggers a multi-arch build:
#   - app (this repo) is checked out at the triggering tag into ws/app,
#   - the release's manifest.json + pnpm-lock.yaml assets are downloaded,
#   - each sibling listed in the manifest is cloned at its pinned SHA,
#   - bootstrap --assemble-only writes the workspace-root scaffolding (members
#     are already present, so it doesn't re-clone them),
#   - the pinned pnpm-lock.yaml is dropped into ws/ for `pnpm install --frozen-lockfile`.
#
# Trigger is `release: published` only — NOT `push: tags`. The release
# event fires after release.ts uploads the manifest + lockfile assets;
# triggering on tag push would race ahead and fail to download the assets
# before they exist (the release create + asset upload happen client-side
# after the tag is pushed).
on:
  release:
    types: [published]
  workflow_dispatch:

# Cancel any in-flight build for the same ref so a re-publish or a
# manual workflow_dispatch supersedes an earlier run rather than
# fighting it for the buildx cache.
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Per-platform build ────────────────────────────────────────────────
  # Each architecture builds on a *native* runner (amd64 on ubuntu-latest,
  # arm64 on ubuntu-24.04-arm). No QEMU emulation. Each job pushes a digest
  # to GHCR but does NOT tag it; the merge job below assembles the
  # multi-arch manifest and applies the human-readable tags.
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            cache_scope: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            cache_scope: arm64

    steps:
      # The triggering ref of THIS (app) repo is the released tag, so a plain
      # checkout lands app@<tag> into ws/app — the app member pinned. bootstrap
      # below sees ws/app already present and skips re-cloning it.
      - name: Checkout app member (at the triggering tag)
        uses: actions/checkout@v5
        with:
          path: ws/app

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/tinycld" >> "$GITHUB_OUTPUT"

      # app carries its own .node-version; read it directly from the pinned
      # checkout (no dependency on bootstrap having generated ws/.node-version yet).
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: ws/app/.node-version
      # Assemble the workspace from the pinned release recipe attached to
      # the app's GitHub Release. release.ts uploads manifest.json (sibling
      # name → repo + tag + sha) and pnpm-lock.yaml as assets when it
      # cuts an app release. We download both, clone each sibling at its
      # pinned sha, let bootstrap write the workspace scaffolding (members
      # are already present so it skips cloning), and drop the pinned
      # lockfile into ws/. The resulting workspace is byte-identical to
      # what the release author built locally — rebuilding the same tag
      # produces the same image six months from now.
      - name: Assemble workspace from pinned release manifest
        working-directory: ws
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-$(git -C app describe --tags --exact-match)}"
          echo "Downloading release assets for ${TAG}…"
          mkdir -p .release-assets
          gh release download "${TAG}" -R "${GITHUB_REPOSITORY}" \
            -p manifest.json -p pnpm-lock.yaml \
            --dir .release-assets
          MANIFEST=".release-assets/manifest.json"
          LOCKFILE=".release-assets/pnpm-lock.yaml"
          echo "Manifest contents:"
          cat "${MANIFEST}"
          jq -r '.members[] | "\(.name)\t\(.repo)\t\(.sha)"' "$MANIFEST" | while IFS=$'\t' read -r name repo sha; do
            echo "Cloning ${repo} @ ${sha} → ${name}"
            git clone --quiet "https://github.com/${repo}.git" "${name}"
            git -C "${name}" fetch --quiet origin "${sha}"
            git -C "${name}" checkout --quiet "${sha}"
          done
          # bootstrap sees every member already cloned (app + core + each sibling)
          # and just writes the workspace-root scaffolding (package.json +
          # pnpm-workspace.yaml + .npmrc + tinycld.packages.ts +
          # scripts/link-members.ts). --assemble-only is non-destructive: it skips
          # any member already present, cloning only what's missing. (Replaces the
          # v1 --tooling flag, removed in bootstrap v2.)
          TINYCLD_REPO_BASE=https://github.com/tinycld npx @tinycld/bootstrap@latest --assemble-only \
            --with contacts --with mail --with calendar --with drive \
            --with calc --with text --with google-takeout-import
          # Drop the pinned lockfile into the workspace root so the Dockerfile's
          # `pnpm install --frozen-lockfile` reproduces the exact dependency set.
          cp "${LOCKFILE}" pnpm-lock.yaml
          # Hand the manifest to the Docker build so it's baked into the image
          # and served by /api/release (the About panel reads it). The wildcard
          # COPY in the Dockerfile makes it optional, so this is the only wiring.
          cp "${MANIFEST}" app/.release-manifest

      # Derive OCI labels (standard image.* + custom tinycld.packages) from the
      # pinned manifest so `docker inspect` and registry UIs show exactly which
      # package versions this image bundles. The inventory (key=value lines) is
      # produced by app/scripts/release-image-inventory.sh — the SAME script the
      # merge job uses for index annotations, so labels and annotations can't
      # drift. `org.tinycld.packages` is a compact app=tag,member=tag list.
      - name: Compute image labels
        id: labels
        working-directory: ws
        run: |
          set -euo pipefail
          # build-push-action's `labels:` input takes the same newline-delimited
          # key=value format the script emits, so pass it straight through.
          app/scripts/release-image-inventory.sh \
            .release-assets/manifest.json "${GITHUB_REPOSITORY}" > /tmp/image-inventory.txt
          {
            echo "labels<<EOF"
            cat /tmp/image-inventory.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Inventory:"
          cat /tmp/image-inventory.txt

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ws
          file: ws/app/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.labels.outputs.labels }}
          # Cache scoped per-platform so the two jobs don't trample each
          # other's layers. Cache hit speeds repeat builds dramatically.
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
          # Push by digest only — no tag yet. The merge job picks up these
          # digests and stitches them into a single multi-arch manifest.
          outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest='${{ steps.build.outputs.digest }}'
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.cache_scope }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Merge per-platform digests into a multi-arch manifest ────────────
  # This job runs after both build jobs succeed. It downloads the digests,
  # uses `docker buildx imagetools create` to assemble the manifest list
  # under each desired tag (versioned + optional :latest).
  merge:
    name: Merge multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/tinycld" >> "$GITHUB_OUTPUT"

      # Per-arch labels live on the child manifests; the multi-arch index needs
      # annotations set explicitly. This job has no ws/ checkout, so re-download
      # the pinned manifest AND the inventory script from the release tag's tree,
      # then build the same key=value inventory the per-arch labels used (one
      # source of truth — app/scripts/release-image-inventory.sh). The args are
      # written to a FILE the create step reads directly; nothing is round-tripped
      # through a `${{ }}`-interpolated shell string, so a value containing shell
      # metacharacters can't be re-split or injected.
      - name: Compute index annotations
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-${{ github.event.release.tag_name }}}"
          mkdir -p /tmp/rel
          gh release download "${TAG}" -R "${GITHUB_REPOSITORY}" -p manifest.json --dir /tmp/rel
          # Fetch the inventory script from the tagged commit so the merge job
          # uses the exact same logic as the per-arch build (no ws/ checkout here).
          gh api "repos/${GITHUB_REPOSITORY}/contents/app/scripts/release-image-inventory.sh?ref=${TAG}" \
            -H 'Accept: application/vnd.github.raw' > /tmp/release-image-inventory.sh
          chmod +x /tmp/release-image-inventory.sh
          # One --annotation=index:<k>=<v> arg per inventory line, written to a
          # file the create step reads with `read -r` (no eval, no word-splitting).
          /tmp/release-image-inventory.sh /tmp/rel/manifest.json "${GITHUB_REPOSITORY}" \
            | sed 's/^/--annotation=index:/' > /tmp/index-annotations.txt
          echo "Index annotations:"
          cat /tmp/index-annotations.txt

      - name: Derive tags
        id: tags
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          # Disable the auto-flavor that emits :latest for the highest semver.
          # We control :latest explicitly via the type=raw rule below so a raw
          # tag push doesn't accidentally move it.
          flavor: |
            latest=false
          # Tag strategy:
          #   - any v1.2.3 trigger (tag push or release)  → :1.2.3 + :1.2 + :1
          #   - non-prerelease GitHub Release             → also :latest
          # A raw tag push never moves :latest — only a published,
          # non-prerelease GitHub Release does, so we can tag-test without
          # disturbing prod pulls.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && github.event.release.prerelease == false }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          set -eu
          # Build the `--tag` arg list from the metadata-action output. Each
          # line in steps.tags.outputs.tags is a fully-qualified tag like
          # ghcr.io/tinycld/tinycld:0.0.2.
          tag_args=""
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            tag_args="$tag_args --tag $tag"
          done <<< '${{ steps.tags.outputs.tags }}'

          # Each downloaded digest filename is the bare digest (without the
          # 'sha256:' prefix). Compose the source-image-by-digest list.
          src_args=""
          for f in *; do
            [ -e "$f" ] || continue
            src_args="$src_args ${{ steps.image.outputs.name }}@sha256:${f}"
          done

          # Index annotations carry the package-version inventory on the
          # multi-arch manifest list itself — one --annotation arg per line of
          # the file the previous step wrote. Reading from a file (not a
          # `${{ }}`-interpolated string) keeps each arg a single shell word
          # even if a value ever contained whitespace or metacharacters.
          annotation_args=()
          while IFS= read -r ann; do
            [ -z "$ann" ] && continue
            annotation_args+=("$ann")
          done < /tmp/index-annotations.txt

          docker buildx imagetools create "${annotation_args[@]}" $tag_args $src_args

      - name: Inspect published manifest
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "::group::$tag"
            docker buildx imagetools inspect "$tag"
            echo "::endgroup::"
          done <<< '${{ steps.tags.outputs.tags }}'

      - name: Summary
        run: |
          echo "### Published images" >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo 'Multi-arch manifest: `linux/amd64` + `linux/arm64`' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.tags.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
